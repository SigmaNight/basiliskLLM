name: "localization"
on:
  workflow_call:
    inputs:
      branch_name:
        type: string
        description: "Branch name"
        default: "master"
    secrets:
      CROWDIN_TOKEN:
        required: true
        description: "Crowdin personal API token"
      CROWDIN_PROJECT_ID:
        required: true
        description: "Crowdin project ID"

jobs:
  generate_pot:
    runs-on: windows-latest
    env:
      UV_NO_DEV: true
    permissions:
      contents: read
    steps:
      - name: checkout repository
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10"
      - name: setup uv
        uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39"
      - name: Install dependencies
        run: uv sync --frozen --group build
      - name: build POT file
        run: uv run setup.py extract_messages
      - name: upload POT file
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a"
        with:
          name: basiliskLLM.pot
          path: basiliskLLM.pot
          if-no-files-found: error
          retention-days: 30
          archive: false

  upload_on_crowdin:
    runs-on: ubuntu-latest
    needs: [generate_pot]
    if: ${{ inputs.branch_name == 'master' }}
    permissions:
      contents: read
    steps:
      - name: checkout repository
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10"
      - name: download translations template artifact
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c"
        with:
          name: basiliskLLM.pot
          path: ./translations
      - name: move translations template
        run: |
          mv translations/basiliskLLM.pot .
          rm -rf translations
      - name: upload on crowdin
        uses: "crowdin/github-action@52aa776766211d83d975df51f3b9c53c2f8ba35f"
        with:
          upload_sources: true
          upload_translations: true
          config: "./crowdin.yml"
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
